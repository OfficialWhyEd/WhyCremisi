<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="crimsonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC143C"/>
      <stop offset="100%" stop-color="#A00F2E"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB000"/>
      <stop offset="100%" stop-color="#CC8C00"/>
    </linearGradient>
  </defs>

  <!-- WHYCREMISI LOGO MARK
       W crest + sine wave motif
       Colors: cremisi #DC143C (W), amber #FFB000 (sine wave)
       Transparent background, 1024×1024, centered
  -->
  <g transform="translate(512, 430)">

    <!-- W in cremisi
         Drawn as a continuous smooth curve with 2 V-troughs and 3 peaks.
         The W is 560px wide × 520px tall, stroke 80px for bold legibility.
    -->
    <path d="M -280,-300
             C -240,0  -180,190  -140,200
             C -100,190  -40,-260  0,-260
             C 40,-260  100,190  140,200
             C 180,190  240,0  280,-300"
          stroke="url(#crimsonGrad)" stroke-width="80" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Sine wave in amber
         3 full periods, amplitude 60px, stroke 44px.
         Positioned below the W with a clear gap.
         Each half-wave: 50px horizontal, 60px vertical amplitude.
    -->
    <path d="M -280,420
             C -255,360  -205,360  -180,420
             C -155,480  -105,480  -80,420
             C -55,360   -5,360    20,420
             C 45,480    95,480    120,420
             C 145,360   195,360   220,420
             C 245,480   295,480   320,420"
          stroke="url(#amberGrad)" stroke-width="44" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  </g>
</svg>
